
<div style="padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
  <div style="margin: 20px 0; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
    <div style="background: #e9ecef; padding: 10px; border-radius: 5px;">
      <label><b>Proceso: </b></label>
      <select (change)="onTipoChange($event)" style="padding: 5px; border-radius: 4px;">
        <option value="">-- Seleccionar --</option>
        <option value="upload">Subidos</option>
        <option value="consolidado">Consolidado</option>
        <option value="notificaciones">Notificaciones</option>
        <option value="reporte">Reporte</option>
        <option value="procesados">Procesados</option>
      </select>
    </div>

    <div *ngIf="tipoActual" style="background: #d1ecf1; padding: 10px; border-radius: 5px;">
      <label><b>Mostrar: </b></label>
      <select [(ngModel)]="pageSize" (change)="paginaActual = 0">
        <option [ngValue]="10">10 registros</option>
        <option [ngValue]="100">100 registros</option>
      </select>
    </div>

    <div *ngIf="tipoActual" style="flex-grow: 1;">
      <input type="text" placeholder="🔍 Buscar..." (input)="filtrar($event)" style="padding: 10px; width: 100%; border: 2px solid #007bff; border-radius: 20px;">
    </div>
  </div>

  <div *ngIf="!carpetaSeleccionada && tipoActual">
    <table style="width: 100%; border-collapse: collapse;">
      <thead style="background: #343a40; color: white;">
        <tr><th style="padding: 12px; text-align: left;">Carpeta</th><th style="width: 120px;">Acción</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let c of carpetasPaginadas" style="border-bottom: 1px solid #dee2e6;">
          <td style="padding: 10px;">📁 {{ c }}</td>
          <td><button (click)="verCarpeta(c)" style="background: #17a2b8; color: white; border: none; padding: 6px 12px; border-radius: 4px;">Abrir</button></td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="carpetaSeleccionada">
  
  <button *ngIf="carpetaSeleccionada !== 'DIRECTO'" 
          (click)="volver()" 
          style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; margin-bottom: 10px; cursor: pointer;">
    ⬅ Volver a Carpetas
  </button>

  <h3 *ngIf="carpetaSeleccionada === 'DIRECTO'" style="color: #004a99;">
    Lista de archivos Excel subidos:
  </h3>

  <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
    <thead style="background: #28a745; color: white;">
      <tr>
        <th style="padding: 12px; text-align: left;">Nombre del Archivo</th>
        <th style="width: 150px; text-align: center;">Acción</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let a of archivosPaginados" style="border-bottom: 1px solid #dee2e6;">
        <td style="padding: 10px;">📊 {{ a }}</td>
        <td style="text-align: center;">
          <button (click)="descargar(a)" style="background: #ffc107; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">
            ⬇ Descargar
          </button>
        </td>
      </tr>
      <tr *ngIf="archivos.length === 0">
        <td colspan="2" style="padding: 20px; text-align: center; color: #666;">
          No se encontraron archivos en esta categoría.
        </td>
      </tr>
    </tbody>
  </table>
</div>
</div>
